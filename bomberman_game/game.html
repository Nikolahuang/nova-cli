<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可爱炸弹人 💣</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .game-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #ff6b6b;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 10px;
            font-size: 18px;
            color: #555;
        }
        
        canvas {
            border: 3px solid #ddd;
            border-radius: 10px;
            display: block;
            background: #f0f0f0;
        }
        
        .controls {
            margin-top: 15px;
            text-align: center;
        }
        
        .controls p {
            margin: 5px 0;
            color: #666;
            font-size: 14px;
        }
        
        .btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: scale(1.05);
        }
        
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            display: none;
            z-index: 100;
        }
        
        .game-over h2 {
            color: #ff6b6b;
            margin-bottom: 20px;
        }
        
        .game-over p {
            color: #666;
            margin-bottom: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>💣 可爱炸弹人 💣</h1>
        <div class="info">
            <span>❤️ 生命: <span id="lives">3</span></span>
            <span>⭐ 得分: <span id="score">0</span></span>
            <span>关卡: <span id="level">1</span></span>
        </div>
        <canvas id="gameCanvas" width="560" height="560"></canvas>
        <div class="controls">
            <p>🎮 方向键/WASD 移动 | 空格键 放炸弹</p>
            <button class="btn" onclick="restartGame()">🔄 重新开始</button>
        </div>
    </div>
    
    <div class="game-over" id="gameOver">
        <h2 id="gameOverTitle">游戏结束!</h2>
        <p id="gameOverText">最终得分: 0</p>
        <button class="btn" onclick="restartGame()">🔄 再玩一次</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const TILE_SIZE = 40;
        const GRID_WIDTH = 14;
        const GRID_HEIGHT = 14;
        
        // 游戏状态
        let gameState = {
            player: { x: 1, y: 1, lives: 3, invincible: 0 },
            enemies: [],
            bombs: [],
            explosions: [],
            walls: [],
            powerups: [],
            score: 0,
            level: 1,
            gameOver: false,
            paused: false
        };
        
        // 地图元素
        const EMPTY = 0;
        const WALL = 1;
        const BRICK = 2;
        
        // 颜色主题
        const colors = {
            background: '#e8f5e9',
            wall: '#78909c',
            brick: '#ffab91',
            player: '#ff6b6b',
            enemy: '#7e57c2',
            bomb: '#ffd54f',
            explosion: '#ff8a65',
            powerup: '#4fc3f7'
        };
        
        // 初始化地图
        function initMap() {
            gameState.walls = [];
            for (let y = 0; y < GRID_HEIGHT; y++) {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    // 边界墙
                    if (x === 0 || y === 0 || x === GRID_WIDTH - 1 || y === GRID_HEIGHT - 1) {
                        gameState.walls.push({ x, y, type: WALL });
                    }
                    // 内部固定墙
                    else if (x % 2 === 0 && y % 2 === 0) {
                        gameState.walls.push({ x, y, type: WALL });
                    }
                    // 随机可破坏砖块
                    else if (Math.random() < 0.4 && !(x <= 2 && y <= 2)) {
                        gameState.walls.push({ x, y, type: BRICK });
                    }
                }
            }
        }
        
        // 初始化敌人
        function initEnemies() {
            gameState.enemies = [];
            const enemyCount = 2 + gameState.level;
            for (let i = 0; i < enemyCount; i++) {
                let ex, ey;
                do {
                    ex = Math.floor(Math.random() * (GRID_WIDTH - 4)) + 2;
                    ey = Math.floor(Math.random() * (GRID_HEIGHT - 4)) + 2;
                } while (isBlocked(ex, ey) || (ex <= 3 && ey <= 3));
                
                gameState.enemies.push({
                    x: ex,
                    y: ey,
                    dx: Math.random() > 0.5 ? 1 : -1,
                    dy: 0,
                    moveTimer: 0,
                    emoji: ['👻', '👾', '🤖', '👹'][Math.floor(Math.random() * 4)]
                });
            }
        }
        
        // 检查位置是否被阻挡
        function isBlocked(x, y) {
            if (x < 0 || y < 0 || x >= GRID_WIDTH || y >= GRID_HEIGHT) return true;
            return gameState.walls.some(w => w.x === x && w.y === y);
        }
        
        // 检查位置是否有炸弹
        function hasBomb(x, y) {
            return gameState.bombs.some(b => b.x === x && b.y === y);
        }
        
        // 绘制可爱的角色
        function drawCuteCharacter(x, y, emoji, scale = 1) {
            ctx.font = `${32 * scale}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(emoji, x * TILE_SIZE + TILE_SIZE / 2, y * TILE_SIZE + TILE_SIZE / 2 + 4);
        }
        
        // 绘制地图
        function drawMap() {
            ctx.fillStyle = colors.background;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格线
            ctx.strokeStyle = 'rgba(0,0,0,0.05)';
            for (let i = 0; i <= GRID_WIDTH; i++) {
                ctx.beginPath();
                ctx.moveTo(i * TILE_SIZE, 0);
                ctx.lineTo(i * TILE_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= GRID_HEIGHT; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * TILE_SIZE);
                ctx.lineTo(canvas.width, i * TILE_SIZE);
                ctx.stroke();
            }
            
            // 绘制墙壁和砖块
            gameState.walls.forEach(wall => {
                const x = wall.x * TILE_SIZE;
                const y = wall.y * TILE_SIZE;
                
                if (wall.type === WALL) {
                    ctx.fillStyle = colors.wall;
                    ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillRect(x + 4, y + 4, TILE_SIZE - 12, 6);
                } else {
                    ctx.fillStyle = colors.brick;
                    ctx.fillRect(x + 3, y + 3, TILE_SIZE - 6, TILE_SIZE - 6);
                    ctx.strokeStyle = '#e64a19';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x + 3, y + 3, TILE_SIZE - 6, TILE_SIZE - 6);
                }
            });
        }
        
        // 绘制炸弹
        function drawBombs() {
            gameState.bombs.forEach(bomb => {
                const pulse = Math.sin(Date.now() / 100) * 0.2 + 1;
                drawCuteCharacter(bomb.x, bomb.y, '💣', pulse);
                
                // 显示倒计时
                const timeLeft = Math.ceil((bomb.timer - Date.now()) / 1000);
                ctx.fillStyle = '#ff0000';
                ctx.font = 'bold 12px Arial';
                ctx.fillText(timeLeft.toString(), bomb.x * TILE_SIZE + TILE_SIZE / 2, bomb.y * TILE_SIZE + 8);
            });
        }
        
        // 绘制爆炸效果
        function drawExplosions() {
            gameState.explosions.forEach(exp => {
                const alpha = 1 - (Date.now() - exp.startTime) / exp.duration;
                ctx.fillStyle = `rgba(255, 138, 101, ${alpha})`;
                
                exp.tiles.forEach(tile => {
                    ctx.beginPath();
                    ctx.arc(
                        tile.x * TILE_SIZE + TILE_SIZE / 2,
                        tile.y * TILE_SIZE + TILE_SIZE / 2,
                        TILE_SIZE / 2 - 5,
                        0, Math.PI * 2
                    );
                    ctx.fill();
                    
                    // 火焰效果
                    drawCuteCharacter(tile.x, tile.y, '💥', alpha);
                });
            });
        }
        
        // 绘制玩家
        function drawPlayer() {
            if (gameState.player.invincible > 0 && Math.floor(Date.now() / 100) % 2 === 0) {
                return; // 无敌闪烁效果
            }
            drawCuteCharacter(gameState.player.x, gameState.player.y, '😊');
        }
        
        // 绘制敌人
        function drawEnemies() {
            gameState.enemies.forEach(enemy => {
                drawCuteCharacter(enemy.x, enemy.y, enemy.emoji);
            });
        }
        
        // 绘制道具
        function drawPowerups() {
            gameState.powerups.forEach(powerup => {
                const bounce = Math.sin(Date.now() / 200) * 3;
                ctx.save();
                ctx.translate(0, bounce);
                drawCuteCharacter(powerup.x, powerup.y, powerup.emoji);
                ctx.restore();
            });
        }
        
        // 放置炸弹
        function placeBomb() {
            const { x, y } = gameState.player;
            if (!hasBomb(x, y)) {
                gameState.bombs.push({
                    x, y,
                    timer: Date.now() + 3000,
                    power: 2,
                    startTime: Date.now()
                });
            }
        }
        
        // 爆炸处理
        function explodeBomb(bomb) {
            const explosionTiles = [{ x: bomb.x, y: bomb.y }];
            
            // 四个方向
            const directions = [[0, -1], [0, 1], [-1, 0], [1, 0]];
            directions.forEach(([dx, dy]) => {
                for (let i = 1; i <= bomb.power; i++) {
                    const nx = bomb.x + dx * i;
                    const ny = bomb.y + dy * i;
                    
                    if (isBlocked(nx, ny)) {
                        // 检查是否是可破坏砖块
                        const wallIndex = gameState.walls.findIndex(w => w.x === nx && w.y === ny && w.type === BRICK);
                        if (wallIndex !== -1) {
                            gameState.walls.splice(wallIndex, 1);
                            explosionTiles.push({ x: nx, y: ny });
                            // 可能掉落道具
                            if (Math.random() < 0.3) {
                                spawnPowerup(nx, ny);
                            }
                        }
                        break;
                    }
                    explosionTiles.push({ x: nx, y: ny });
                }
            });
            
            gameState.explosions.push({
                tiles: explosionTiles,
                startTime: Date.now(),
                duration: 500
            });
            
            // 检查是否炸到玩家
            if (explosionTiles.some(t => t.x === gameState.player.x && t.y === gameState.player.y)) {
                hitPlayer();
            }
            
            // 检查是否炸到敌人
            gameState.enemies = gameState.enemies.filter(enemy => {
                if (explosionTiles.some(t => t.x === enemy.x && t.y === enemy.y)) {
                    gameState.score += 100;
                    updateUI();
                    return false;
                }
                return true;
            });
            
            // 连锁爆炸
            gameState.bombs.forEach(b => {
                if (b !== bomb && explosionTiles.some(t => t.x === b.x && t.y === b.y)) {
                    b.timer = Date.now();
                }
            });
        }
        
        // 生成道具
        function spawnPowerup(x, y) {
            const powerups = [
                { type: 'life', emoji: '❤️' },
                { type: 'power', emoji: '⭐' },
                { type: 'speed', emoji: '👟' }
            ];
            const powerup = powerups[Math.floor(Math.random() * powerups.length)];
            gameState.powerups.push({ x, y, ...powerup });
        }
        
        // 玩家受伤
        function hitPlayer() {
            if (gameState.player.invincible > 0) return;
            
            gameState.player.lives--;
            gameState.player.invincible = Date.now() + 2000;
            updateUI();
            
            if (gameState.player.lives <= 0) {
                endGame(false);
            }
        }
        
        // 更新UI
        function updateUI() {
            document.getElementById('lives').textContent = gameState.player.lives;
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;
        }
        
        // 移动敌人
        function moveEnemies() {
            gameState.enemies.forEach(enemy => {
                enemy.moveTimer++;
                if (enemy.moveTimer < 20) return;
                enemy.moveTimer = 0;
                
                // 随机改变方向
                if (Math.random() < 0.3) {
                    const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]];
                    const dir = dirs[Math.floor(Math.random() * dirs.length)];
                    enemy.dx = dir[0];
                    enemy.dy = dir[1];
                }
                
                const nx = enemy.x + enemy.dx;
                const ny = enemy.y + enemy.dy;
                
                if (!isBlocked(nx, ny) && !hasBomb(nx, ny)) {
                    enemy.x = nx;
                    enemy.y = ny;
                } else {
                    enemy.dx *= -1;
                    enemy.dy *= -1;
                }
                
                // 检查是否碰到玩家
                if (enemy.x === gameState.player.x && enemy.y === gameState.player.y) {
                    hitPlayer();
                }
            });
        }
        
        // 检查道具收集
        function checkPowerups() {
            gameState.powerups = gameState.powerups.filter(powerup => {
                if (powerup.x === gameState.player.x && powerup.y === gameState.player.y) {
                    if (powerup.type === 'life') {
                        gameState.player.lives++;
                    } else if (powerup.type === 'power') {
                        gameState.score += 50;
                    } else if (powerup.type === 'speed') {
                        gameState.score += 30;
                    }
                    updateUI();
                    return false;
                }
                return true;
            });
        }
        
        // 检查关卡完成
        function checkLevelComplete() {
            if (gameState.enemies.length === 0) {
                gameState.level++;
                gameState.score += 500;
                initMap();
                initEnemies();
                gameState.player.x = 1;
                gameState.player.y = 1;
                gameState.bombs = [];
                gameState.explosions = [];
                gameState.powerups = [];
                updateUI();
            }
        }
        
        // 游戏结束
        function endGame(win) {
            gameState.gameOver = true;
            const overlay = document.getElementById('gameOver');
            const title = document.getElementById('gameOverTitle');
            const text = document.getElementById('gameOverText');
            
            title.textContent = win ? '🎉 恭喜过关!' : '💀 游戏结束!';
            text.textContent = `最终得分: ${gameState.score}`;
            overlay.style.display = 'block';
        }
        
        // 重新开始
        function restartGame() {
            gameState = {
                player: { x: 1, y: 1, lives: 3, invincible: 0 },
                enemies: [],
                bombs: [],
                explosions: [],
                walls: [],
                powerups: [],
                score: 0,
                level: 1,
                gameOver: false,
                paused: false
            };
            document.getElementById('gameOver').style.display = 'none';
            initMap();
            initEnemies();
            updateUI();
        }
        
        // 游戏主循环
        function gameLoop() {
            if (gameState.gameOver) return;
            
            // 更新炸弹
            gameState.bombs = gameState.bombs.filter(bomb => {
                if (Date.now() >= bomb.timer) {
                    explodeBomb(bomb);
                    return false;
                }
                return true;
            });
            
            // 清理爆炸效果
            gameState.explosions = gameState.explosions.filter(exp => {
                return Date.now() - exp.startTime < exp.duration;
            });
            
            // 移动敌人
            moveEnemies();
            
            // 检查无敌状态
            if (gameState.player.invincible > 0 && Date.now() > gameState.player.invincible) {
                gameState.player.invincible = 0;
            }
            
            // 检查道具
            checkPowerups();
            
            // 检查关卡完成
            checkLevelComplete();
            
            // 绘制
            drawMap();
            drawPowerups();
            drawBombs();
            drawExplosions();
            drawPlayer();
            drawEnemies();
            
            requestAnimationFrame(gameLoop);
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (gameState.gameOver) return;
            
            let nx = gameState.player.x;
            let ny = gameState.player.y;
            
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    ny--;
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    ny++;
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    nx--;
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    nx++;
                    break;
                case ' ':
                    placeBomb();
                    return;
            }
            
            if (!isBlocked(nx, ny) && !hasBomb(nx, ny)) {
                gameState.player.x = nx;
                gameState.player.y = ny;
            }
        });
        
        // 初始化游戏
        initMap();
        initEnemies();
        updateUI();
        gameLoop();
    </script>
</body>
</html>
